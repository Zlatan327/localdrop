<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalDrop - PC Dashboard</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/qrcode.min.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <div>
        <h1 class="logo">LocalDrop</h1>
        <p class="subtitle">PC File Receiver - Seamless local network transfers</p>
      </div>
      <div style="background: var(--bg); padding: 0.5rem 1rem; border-radius: 2rem; border: 1px solid var(--border); display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem;">
        <span style="display: block; width: 8px; height: 8px; background: var(--success); border-radius: 50%;"></span>
        Server Active
      </div>
    </header>

    <div class="grid">
      <div class="card">
        <h2 class="card-title">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
          Connect Device
        </h2>
        
        <div class="qr-container">
          <div id="qrcode" style="display: flex; justify-content: center; align-items: center; width: 100%; height: 100%;"></div>
        </div>

        <p style="text-align: center; color: var(--text-muted); font-size: 0.875rem; margin-bottom: 0.5rem;">Scan to upload, or visit:</p>
        <div class="code-box" id="url-box">Loading URL...</div>
      </div>

      <div class="card" style="display: flex; flex-direction: column;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <h2 class="card-title" style="margin-bottom: 0;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--success)"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>
            Received Files
          </h2>
          <button onclick="fetchFiles()" style="background: none; border: none; color: var(--text-muted); cursor: pointer;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          </button>
        </div>

        <div id="file-list" class="file-list">
          <!-- Files will be injected here -->
        </div>
      </div>
    </div>
  </div>

  <script>
    async function init() {
      try {
        const res = await fetch('/api/ip');
        const data = await res.json();
        
        const uploadUrl = `http://${data.ip}:${data.port}/upload`;
        document.getElementById('url-box').innerText = uploadUrl;
        
        // Generate QR code locally (no internet needed!)
        new QRCode(document.getElementById("qrcode"), {
          text: uploadUrl,
          width: 200,
          height: 200,
          colorDark: "#000000",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.H
        });

        fetchFiles();
        setInterval(fetchFiles, 3000);
      } catch (e) {
        console.error('Init failed', e);
      }
    }

    async function fetchFiles() {
      try {
        const res = await fetch('/api/files');
        const data = await res.json();
        const list = document.getElementById('file-list');
        
        if (!data.files || data.files.length === 0) {
          list.innerHTML = `
            <div style="text-align: center; padding: 3rem 1rem; color: var(--text-muted); border: 2px dashed var(--border); border-radius: 1rem;">
              <p>No files received yet. Scan the QR code to start.</p>
            </div>
          `;
          return;
        }

        list.innerHTML = data.files.map(f => {
          const ext = f.name.split('.').pop().toLowerCase();
          let iconSvg = '<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/>'; // generic
          let iconColor = 'var(--primary)';
          let iconBg = 'rgba(59, 130, 246, 0.1)';

          if (['zip', 'rar', 'tar', 'gz', '7z'].includes(ext)) {
            iconSvg = '<path d="M21 8v13H3V3h13l5 5z"/><path d="M21 8h-5V3"/><path d="M10 12v6"/><path d="M14 12v6"/><path d="M10 12h4"/><path d="M10 15h4"/><path d="M10 18h4"/>';
            iconColor = '#f59e0b'; // amber
            iconBg = 'rgba(245, 158, 11, 0.1)';
          } else if (['js', 'ts', 'py', 'java', 'c', 'cpp', 'html', 'css', 'json'].includes(ext)) {
            iconSvg = '<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>';
            iconColor = '#8b5cf6'; // purple
            iconBg = 'rgba(139, 92, 246, 0.1)';
          } else if (['pdf', 'doc', 'docx', 'txt', 'csv', 'xlsx'].includes(ext)) {
            iconSvg = '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>';
            iconColor = '#10b981'; // emerald
            iconBg = 'rgba(16, 185, 129, 0.1)';
          } else if (['mp4', 'mov', 'avi', 'mkv', 'png', 'jpg', 'jpeg', 'svg'].includes(ext)) {
            iconSvg = '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>';
            iconColor = '#ec4899'; // pink
            iconBg = 'rgba(236, 72, 153, 0.1)';
          }

          return `
          <div class="file-item">
            <div class="file-icon" style="color: ${iconColor}; background: ${iconBg};">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${iconSvg}</svg>
            </div>
            <div class="file-info">
              <div class="file-name" title="${f.name}">${f.name}</div>
              <div class="file-meta">
                ${(f.size / 1024 / 1024).toFixed(2)} MB &bull; ${new Date(f.createdAt).toLocaleString()}
              </div>
            </div>
          </div>
        `}).join('');

      } catch (e) {
        console.error('Fetch files failed', e);
      }
    }

    init();
  </script>
</body>
</html>
